<!-- footdarts.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🏈 FootDarts</title>
  <link rel="stylesheet" href="footdarts.css">
</head>
<body>
  <h1>🏈 FootDarts</h1>

  <div id="setup">
    <label>Number of Players:</label>
    <input type="number" id="numPlayers" min="1" max="8" value="2">
    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="game" style="display:none;">
    <div id="field">
      <div id="ball"></div>
    </div>

    <div id="playerInfo"></div>

    <div id="controls">
      <button onclick="recordThrow('single')">Single</button>
      <button onclick="recordThrow('double')">Double</button>
      <button onclick="recordThrow('triple')">Triple</button>
      <button onclick="recordThrow('outerBull')">Outer Bull</button>
      <button onclick="recordThrow('innerBull')">Inner Bull</button>
    </div>

    <div id="log"></div>
  </div>

  <script src="footdarts.js"></script>
</body>
</html>
